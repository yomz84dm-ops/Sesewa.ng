name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build
          cd functions && npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Integration Tests with Firebase Emulator
        run: |
          npm install -g firebase-tools
          firebase emulators:exec --project demo-sesewa-ng "npm run clear-db && npm run seed && npm test && npm run verify-credits -- test-user 10"
        env:
          TEST_MODE_SECRET: ${{ secrets.TEST_MODE_SECRET }}
          NODE_ENV: test
          PAYSTACK_SECRET_KEY: sk_test_dummy
          RECAPTCHA_SECRET_KEY: 6LeIxAcTAAAAAGG-v3JQ96ma91Az348Vw5998p6A

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v2.2.1
        with:
          args: deploy --only hosting,functions:api,firestore:rules,storage:rules
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Prune Unused Secrets
        uses: w9jds/firebase-action@v2.2.1
        with:
          args: functions:secrets:prune --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}